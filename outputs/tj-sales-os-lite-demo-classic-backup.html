<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TJ-SalesOS 買取詳細</title>
  <style>
    :root {
      --bg:#eeeeee;
      --line:#000;
      --red:#b00018;
      --red-dark:#65000b;
      --blue:#0077c8;
      --yellow:#ffb000;
      --ink:#050505;
      --muted:#555;
      --paper:#fffdf9;
      --pink:linear-gradient(100deg,#fffdf9 0%,#fffdf9 48%,#fff3f4 76%,#f8d6dc 100%);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:"Yu Gothic","Yu Gothic UI","Meiryo","Arial Black","Segoe UI",sans-serif;
      font-size:12px;
      font-weight:1000;
    }
    .shell { min-height:100vh; display:grid; grid-template-columns:220px minmax(1120px,1fr); align-items:start; }
    .side {
      background:linear-gradient(180deg,#fffdf9 0%,#f1f1f1 100%);
      color:#000; padding:18px 14px; position:sticky; top:0; height:100vh;
      border-right:4px solid #000;
    }
    .brand { font-size:23px; font-weight:1000; line-height:1; letter-spacing:.01em; margin-bottom:6px; color:#000; text-shadow:none; }
    .brand-sub { color:#5a5a5a; font-size:10px; font-weight:1000; letter-spacing:.10em; margin-bottom:18px; }
    .side .dept-select { width:100%; min-width:0; background:#fff; color:#000; border:3px solid #000; margin-bottom:16px; }
    .menu { display:grid; gap:8px; }
    .menu button {
      border:3px solid #000; background:#fff; color:#111; padding:11px 10px; text-align:left;
      font-weight:1000; cursor:pointer; border-left:5px solid transparent; letter-spacing:.02em;
    }
    .menu button.active { color:#000; border-color:#000; border-left-color:var(--red); background:linear-gradient(90deg,#fff 0%,#fff3f4 100%); box-shadow:3px 3px 0 rgba(0,0,0,.18); }
    .page { width:100%; max-width:none; margin:0; padding:22px 34px 42px; }
    .crumb { margin:0 0 10px; color:#222; font-weight:1000; }
    .title-bar {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      height:48px; border:4px solid var(--line); border-left:8px solid var(--red);
      border-radius:7px;
      background:var(--paper); padding:0 16px; margin-bottom:18px;
    }
    .title-bar h1 { margin:0; font-size:20px; font-weight:1000; letter-spacing:.03em; }
    .dept-select { min-width:190px; border:3px solid var(--line); background:#fff; padding:6px 10px; font-weight:1000; }
    .panel { border:4px solid var(--line); border-radius:8px; background:var(--paper); padding:16px; margin-bottom:22px; box-shadow:4px 4px 0 rgba(0,0,0,.16); }
    .panel-title {
      margin:0 0 10px; padding-bottom:8px; border-bottom:4px solid var(--line);
      font-size:15px; font-weight:1000; color:var(--red); letter-spacing:.02em;
    }
    .grid { display:grid; gap:8px; }
    .top-kpi { grid-template-columns:1fr 1fr; }
    .split-2 { grid-template-columns:1fr 1fr; }
    .split-3 { grid-template-columns:1.05fr .95fr; }
    .mini-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .aa-grid { grid-template-columns:.82fr 1.18fr; align-items:stretch; }
    .box {
      border:3px solid var(--line); border-radius:7px; background:var(--paper); padding:12px; min-height:72px;
      position:relative; overflow:hidden;
    }
    .box.tint, .big-kpi, .aa-main { background:var(--pink); }
    .big-kpi, .aa-main {
      isolation:isolate;
    }
    .big-kpi::before, .aa-main::before {
      content:"";
      position:absolute;
      inset:-40%;
      z-index:0;
      background:
        radial-gradient(circle at 18% 24%, rgba(255,255,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 34%, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle at 42% 76%, rgba(255,255,255,.75) 0 2px, transparent 3px),
        linear-gradient(115deg, transparent 34%, rgba(255,255,255,.88) 46%, transparent 58%);
      opacity:.72;
      transform:translateX(-34%) rotate(8deg);
      animation:kanteiShine 2.6s linear infinite;
      pointer-events:none;
    }
    .big-kpi::after, .aa-main::after {
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      background:
        repeating-linear-gradient(135deg, transparent 0 13px, rgba(176,0,24,.045) 14px 16px),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.6), transparent 20%);
      pointer-events:none;
    }
    .big-kpi > *, .aa-main > * { position:relative; z-index:1; }
    .box-label { font-size:12px; font-weight:1000; color:#000; margin-bottom:7px; letter-spacing:.03em; }
    .flag {
      display:inline-flex; align-items:center; justify-content:center;
      align-self:flex-start;
      width:auto;
      min-width:112px; height:34px; background:linear-gradient(180deg,#e0001b 0%,#a30016 55%,#65000b 100%);
      color:#fff; border:3px solid #000; border-radius:5px; font-size:15px; font-weight:1000; padding:0 14px;
      box-shadow:4px 4px 0 #111; letter-spacing:.05em;
    }
    .big-kpi {
      min-height:142px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:12px;
      border-width:4px;
      box-shadow:5px 5px 0 rgba(0,0,0,.18);
    }
    .big-row { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
    .big-value { font-family:"Arial Black","Impact","Yu Gothic",sans-serif; font-size:60px; line-height:.92; font-weight:1000; letter-spacing:0; white-space:nowrap; color:#000; text-shadow:.8px .8px 0 #000; }
    .unit { font-size:.62em; margin-left:2px; }
    .black-badge {
      min-width:116px; border:3px solid var(--red); border-radius:6px; background:#050505; color:#fff; padding:10px;
      min-height:70px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      box-shadow:4px 4px 0 rgba(0,0,0,.34);
    }
    .black-badge span { display:block; font-size:10px; font-weight:1000; margin-bottom:5px; letter-spacing:.03em; width:100%; }
    .black-badge b { display:block; font-family:"Arial Black","Impact","Yu Gothic",sans-serif; font-size:31px; line-height:1; font-weight:1000; width:100%; }
    .metric-value { font-family:"Arial Black","Impact","Yu Gothic",sans-serif; font-size:26px; line-height:1; font-weight:1000; white-space:nowrap; color:#000; }
    .metric-value.negative { color:var(--red); }
    .bar-line { margin-top:9px; }
    .bar-line .bar-meta { display:flex; justify-content:space-between; gap:10px; font-weight:1000; font-size:11px; margin-bottom:4px; color:#000; }
    .track { height:13px; border:3px solid #000; background:#fff; border-radius:12px; overflow:hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,.12); }
    .fill { height:100%; width:0; background:linear-gradient(90deg,#b00018 0%,#65000b 68%,#111 100%); border-right:3px solid #000; transition:width 1.15s cubic-bezier(.16,1,.3,1); }
    .stack { border:3px solid var(--line); border-radius:7px; background:#fff; padding:12px; }
    .stack-title { margin:0 0 8px; color:var(--red); font-weight:1000; font-size:13px; letter-spacing:.03em; }
    .stackbar { height:22px; border:3px solid #111; background:#fff; border-radius:12px; overflow:hidden; display:flex; box-shadow: inset 0 0 0 1px rgba(0,0,0,.16); }
    .seg { height:100%; min-width:0; width:0; border-right:2px solid #000; transition:width 1.15s cubic-bezier(.16,1,.3,1); }
    .seg.red { background:linear-gradient(180deg,#c9001b,#9b0014 58%,#65000b); }
    .seg.black { background:linear-gradient(180deg,#333,#050505); }
    .seg.blue { background:linear-gradient(180deg,#1fb6ff,#0077c8 70%,#00538a); }
    .seg.yellow { background:linear-gradient(180deg,#ffd247,#ffb000 70%,#d88b00); }
    .legend { display:grid; grid-template-columns:1fr 1fr; gap:6px 18px; margin-top:9px; font-size:11px; font-weight:1000; }
    .dot { display:inline-block; width:9px; height:9px; border-radius:50%; border:2px solid #111; margin-right:5px; vertical-align:middle; }
    .dot.red { background:var(--red); }
    .dot.black { background:#111; }
    .dot.blue { background:var(--blue); }
    .dot.yellow { background:var(--yellow); }
    .aa-main { min-height:244px; display:grid; grid-template-rows:1fr auto auto; gap:8px; }
    .aa-main .big-value { font-size:66px; }
    .aa-subgrid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .aa-side { display:grid; grid-template-columns:1fr; gap:8px; }
    .aa-counts { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
    .warn-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; padding-top:8px; border-top:4px solid #111; }
    .warn { border:3px solid #d6a40d; border-radius:7px; background:#fff9df; padding:9px; }
    .warn .metric-value { font-size:22px; }
    .channel-island {
      border:3px solid var(--line);
      border-radius:8px;
      background:var(--paper);
      padding:12px;
    }
    .channel-title {
      display:inline-flex;
      align-items:center;
      min-height:25px;
      margin:0 0 10px;
      padding:0 10px;
      border:2px solid #73000e;
      background:linear-gradient(180deg,#c9001b 0%,#8b0011 100%);
      color:#fff;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.04em;
      box-shadow:2px 2px 0 #111;
    }
    .channel-grid {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .channel-grid .metric-value {
      font-size:22px;
      letter-spacing:-.02em;
    }
    .counting {
      animation:numberPop .22s ease-out;
    }
    @keyframes kanteiShine {
      0% { transform:translateX(-42%) rotate(8deg); opacity:.28; }
      38% { opacity:.82; }
      100% { transform:translateX(38%) rotate(8deg); opacity:.28; }
    }
    @keyframes numberPop {
      0% { transform:scale(.94); filter:brightness(1.2); }
      100% { transform:scale(1); filter:brightness(1); }
    }
    @media (max-width:720px) {
      .shell { grid-template-columns:170px minmax(0,1fr); }
      .side { padding:14px 10px; }
      .brand { font-size:18px; }
      .menu button { padding:9px 8px; font-size:11px; }
      .page { padding:18px 18px 34px; }
      .title-bar { height:auto; min-height:44px; padding:9px 12px; }
      .top-kpi,.split-2,.split-3,.aa-grid,.aa-counts,.warn-grid { grid-template-columns:1fr; }
      .mini-4 { grid-template-columns:1fr 1fr; }
      .big-kpi { min-height:116px; }
      .big-value { font-size:42px; }
      .black-badge { min-width:96px; padding:8px; }
      .black-badge b { font-size:22px; }
      .metric-value { font-size:21px; }
      .channel-grid .metric-value { font-size:20px; }
      .aa-main .big-value { font-size:52px; }
    }
  </style>
</head>

1851, "スクラップ比率": 0.0296296296296296, "代車比率": 0.0296296296296296, "買取キャンセルQ": 3, "キャンセル比率": 0.346109839816933, "入庫平均日数": 0, "即決契約数": 0, "管理契約数": 1, "当月AA出品Q": 0, "当月出品Q": 0, "当月出品比率": 0, "AA相違Q": 0, "AA相違比率": 0, "当月AAMQ": 0, "AA落札Q": 0, "AA未処理Q": 0, "AA流札Q": 0, "AA取消Q": 0, "AA翌月Q": 0, "AA赤字金額": 0, "AA赤字Q": 0, "AA赤字比率": 0}, {"営業部名": "北関東営業部", "査定Ｑ": 279, "買取Ｑ": 100, "成約CVR": 0.3584229390681, "AA@": 190, "AAQ": 64, "商品Q": 31, "スクラップQ": 4, "代車Q": 1, "AA比率": 0.64, "商品比率": 0.31, "スクラップ比率": 0.04, "代車比率": 0.01, "買取キャンセルQ": 1, "キャンセル比率": 0.0526315789473684, "入庫平均日数": 0, "即決契約数": 0, "管理契約数": 0, "当月AA出品Q": 1, "当月出品Q": 1, "当月出品比率": 1, "AA相違Q": 0, "AA相違比率": 0, "当月AAMQ": 190, "AA落札Q": 1, "AA未処理Q": 0, "AA流札Q": 0, "AA取消Q": 0, "AA翌月Q": 0, "AA赤字金額": 0, "AA赤字Q": 0, "AA赤字比率": 0}, {"営業部名": "大阪営業部", "査定Ｑ": 331, "買取Ｑ": 125, "成約CVR": 0.377643504531722, "AA@": 0, "AAQ": 61, "商品Q": 45, "スクラップQ": 14, "代車Q": 5, "AA比率": 0.488, "商品比率": 0.36, "スクラップ比率": 0.112, "代車比率": 0.04, "買取キャンセルQ": 1, "キャンセル比率": 0.0625, "入庫平均日数": 0, "即決契約数": 0, "管理契約数": 0, "当月AA出品Q": 0, "当月出品Q": 0, "当月出品比率": 0, "AA相違Q": 0, "AA相違比率": 0, "当月AAMQ": 0, "AA落札Q": 0, "AA未処理Q": 0, "AA流札Q": 0, "AA取消Q": 0, "AA翌月Q": 0, "AA赤字金額": 0, "AA赤字Q": 0, "AA赤字比率": 0}];
    let rows = [];
    let current = null;

    const moneyKKeys = new Set(['AA@','当月AAMQ','AA赤字金額']);
    const percentKeys = new Set(['成約CVR','AA比率','商品比率','スクラップ比率','代車比率','当月出品比率','AA相違比率','キャンセル比率','AA赤字比率']);

    function runGas(name, args) {
      return new Promise((resolve, reject) => {
        if (!window.google || !google.script || !google.script.run) return resolve(MOCK_ROWS);
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name].apply(google.script.run, args || []);
      });
    }
    function esc(v) { return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s])); }
    function num(v) { const n = Number(String(v ?? '').replace(/[¥￥,%台件日\s]/g,'')); return isNaN(n) ? 0 : n; }
    function pct(v) { const n = num(v); return Math.abs(n) <= 1 ? n * 100 : n; }
    function fmtPct(v) { return `${pct(v).toFixed(1)}%`; }
    function fmtValue(key, value) {
      if (value === '' || value === null || value === undefined) return '-';
      const n = num(value);
      if (percentKeys.has(key)) return fmtPct(value);
      if (moneyKKeys.has(key)) return `${n < 0 ? '-' : ''}¥${Math.abs(Math.round(n * 1000)).toLocaleString('ja-JP')}`;
      if (key === '入庫平均日数') return `${n.toFixed(1).replace(/\.0$/,'')}`;
      return Math.round(n).toLocaleString('ja-JP');
    }
    function dataTypeFor(key) {
      if (percentKeys.has(key)) return 'percent';
      if (moneyKKeys.has(key)) return 'moneyK';
      if (key === '入庫平均日数') return 'days';
      return 'number';

    function animatedValue(key, value, suffix='') {

    }
    function channelMetric(label, key, totalKey, caption) {

      const rate = ratio(v, current?.[totalKey]);
      return `<div class="box">
        <div class="box-label">${esc(label)}</div>
        <div class="metric-value">${animatedValue(key,v,'台')} / <span class="js-count" data-count-type="percentPlain" data-count-value="${esc(rate)}">${rate.toFixed(1)}%</span></div>
        <div class="bar-line">
          <div class="bar-meta"><span>${esc(caption || label)}</span><span>${rate.toFixed(1)}%</span></div>
          <div class="track"><div class="fill js-bar" data-target-width="${clamp(rate)}"></div></div>
        </div>
      </div>`;
    }
    function ratio(v, total) {
      const t = num(total);
      if (!t) return 0;
      return num(v) / t * 100;
    }
    function clamp(n) { return Math.max(0, Math.min(100, n || 0)); }
    function stack(title, items, totalKey) {
      const total = totalKey ? num(current?.[totalKey]) : items.reduce((s, it) => s + num(current?.[it.key]), 0);
      const colors = ['red','black','blue','yellow'];
      const segs = items.map((it, i) => `<span class="seg ${colors[i % colors.length]} js-seg" data-target-width="${clamp(total ? num(current?.[it.key]) / total * 100 : 0)}"></span>`).join('');
      const legend = items.map((it, i) => `<span><i class="dot ${colors[i % colors.length]}"></i>${esc(it.label)} ${esc(fmtValue(it.key,current?.[it.key]))} / ${(total ? num(current?.[it.key]) / total * 100 : 0).toFixed(1)}%</span>`).join('');
      return `<div class="stack">
        <p class="stack-title">${esc(title)}</p>
        <div class="stackbar">${segs}</div>
        <div class="legend">${legend}</div>
      </div>`;
    }
    function bigKpi(label, key, unit, badgeLabel, badgeKey) {
      return `<div class="big-kpi box">
        <span class="flag">${esc(label)}</span>
        <div class="big-row">
          <div class="big-value">${animatedValue(key,current?.[key])}<span class="unit">${esc(unit)}</span></div>
          <div class="black-badge"><span>${esc(badgeLabel)}</span><b>${animatedValue(badgeKey,current?.[badgeKey])}</b></div>
        </div>
      </div>`;
    }
    function renderPurchase() {
      document.getElementById('content').innerHTML = `
        <section class="panel">
          <h2 class="panel-title">買取実績詳細</h2>
          <div class="grid top-kpi">
            ${bigKpi('査定数','査定Ｑ','件','査定CVR','成約CVR')}
            ${bigKpi('買取台数','買取Ｑ','台','成約CVR','成約CVR')}
          </div>
          <div class="grid split-3" style="margin-top:14px;">
            <div class="grid">
              <div class="channel-island">
                <h3 class="channel-title">販路内訳</h3>
                <div class="channel-grid">
                  ${channelMetric('AA','AAQ','買取Ｑ','AA比率')}
                  ${channelMetric('商品','商品Q','買取Ｑ','商品比率')}
                  ${channelMetric('スクラップ','スクラップQ','買取Ｑ','スクラップ比率')}
                  ${channelMetric('代車','代車Q','買取Ｑ','代車比率')}
                </div>
              </div>
              <div class="grid split-2">
                ${metric('即決契約','即決契約数','件')}
                ${metric('管理契約','管理契約数','件')}
              </div>
            </div>
            <div class="grid">
              ${stack('販路構成',[
                {label:'AA', key:'AAQ'},
                {label:'商品', key:'商品Q'},
                {label:'スクラップ', key:'スクラップQ'},
                {label:'代車', key:'代車Q'}
              ], '買取Ｑ')}
              ${lineMetric('買取キャンセル','買取キャンセルQ','買取Ｑ','買取キャンセル比率')}
            </div>
          </div>
          <div class="grid split-2" style="margin-top:8px;">
            ${metric('入庫平均日数','入庫平均日数','日',true)}
          </div>
        </section>

        <section class="panel">
          <h2 class="panel-title" style="color:#111;">AA出品詳細</h2>
          <div class="grid aa-grid">
            <div class="aa-main box">
              <div>
                <div class="box-label">出品Q</div>
                <div class="big-value">${animatedValue('当月AA出品Q', current?.['当月AA出品Q'])}<span class="unit">台</span></div>
              </div>
              <div class="aa-subgrid">
                ${metric('AAMQ','当月AAMQ')}
                ${metric('AA@','AA@')}
              </div>
              <div class="aa-subgrid">
                ${metric('処理予定台数','AA未処理Q','台')}
                ${metric('処理予定MQ','当月AAMQ')}
              </div>
            </div>
            <div class="aa-side">
              <div class="aa-counts">
                ${metric('落札Q','AA落札Q','台')}
                ${metric('流札Q','AA流札Q','台')}
                ${metric('取消Q','AA取消Q','台')}
              </div>
              ${stack('出品Q内訳',[
                {label:'落札', key:'AA落札Q'},
                {label:'流札', key:'AA流札Q'},
                {label:'取消', key:'AA取消Q'}
              ], '当月AA出品Q')}
              <div class="warn-grid">
                ${metric('赤字Q比率','AA赤字比率','')}
                ${metric('赤字金額','AA赤字金額','')}
                ${metric('赤字なしAAMQ','当月AAMQ','')}
              </div>
            </div>
          </div>
          <div class="grid split-2" style="margin-top:8px;">
            <div class="grid mini-4">
              ${lineMetric('当月買取出品Q','当月出品Q','買取Ｑ','当月出品比率')}
              ${lineMetric('AA相違','AA相違Q','当月AA出品Q','AA相違比率')}
              ${lineMetric('落札率','AA落札Q','当月AA出品Q','落札率')}
            </div>
            ${metric('持越し台数','AA翌月Q','台',true)}
          </div>
        </section>`;
    }
    function render() {
      document.getElementById('crumbDept').textContent = current?.['営業部名'] || '-';
      document.getElementById('titleDept').textContent = current?.['営業部名'] || '-';
      renderPurchase();
      runKanteiAnimations();
    }
    function renderCount(type, value, key, suffix='') {
      const n = Number(value) || 0;
      if (type === 'percent' || type === 'percentPlain') {
        const pctValue = type === 'percent' ? (Math.abs(n) <= 1 ? n * 100 : n) : n;
        return `${pctValue.toFixed(1)}%`;
      }
      if (type === 'moneyK') return `${n < 0 ? '-' : ''}¥${Math.abs(Math.round(n * 1000)).toLocaleString('ja-JP')}${suffix}`;
      if (type === 'days') return `${n.toFixed(1).replace(/\.0$/,'')}${suffix}`;
      return `${Math.round(n).toLocaleString('ja-JP')}${suffix}`;
    }
    function runKanteiAnimations() {
      const root = document.getElementById('content');
      if (!root) return;
      root.querySelectorAll('.js-bar,.js-seg').forEach(el => {
        el.style.width = '0%';
        const target = Number(el.dataset.targetWidth || 0);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.width = `${target}%`;
        }));
      });
      root.querySelectorAll('.js-count').forEach(el => {
        const target = Number(el.dataset.countValue || 0);
        const type = el.dataset.countType || 'number';
        const key = el.dataset.countKey || '';
        const suffix = el.dataset.countSuffix || '';
        const start = performance.now();
        const duration = type === 'percent' || type === 'percentPlain' ? 850 : 1050;
        const from = 0;
        el.classList.add('counting');
        function tick(now) {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          const value = from + (target - from) * eased;
          el.textContent = renderCount(type, value, key, suffix);
          if (t < 1) requestAnimationFrame(tick);
          else {
            el.textContent = renderCount(type, target, key, suffix);
            setTimeout(() => el.classList.remove('counting'), 80);
          }
        }
        requestAnimationFrame(tick);
      });
    }
    async function init() {
      rows = await runGas('getLiteDashboardRows');
      rows = Array.isArray(rows) ? rows.filter(r => r && r['営業部名']) : MOCK_ROWS;
      const select = document.getElementById('deptSelect');
      select.innerHTML = rows.map(r => `<option>${esc(r['営業部名'])}</option>`).join('');
      current = rows.find(r => r['営業部名'] === '千葉営業部') || rows[0];
      select.value = current?.['営業部名'] || '';
      select.onchange = () => { current = rows.find(r => r['営業部名'] === select.value) || rows[0]; render(); };
      render();
    }
    init();
  </script>
</body>
</html>

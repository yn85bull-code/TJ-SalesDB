<!doctype html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TJ-SalesDB</title>
  <style>
    :root {
      --bg:#f6f7f9;
      --panel:#ffffff;
      --ink:#111318;
      --muted:#6b7280;
      --line:#e2e6ec;
      --line-strong:#cfd5dd;
      --red:#d9001b;
      --red-dark:#a80015;
      --red-soft:#fff0f3;
      --green:#0a8f63;
      --blue:#546e96;
      --nav:#101614;
      --shadow:0 14px 34px rgba(17,24,39,.08);
      --soft-shadow:0 8px 22px rgba(17,24,39,.06);
    }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; }
    body {
      background:
        radial-gradient(circle at 12% 8%, rgba(217,0,27,.055), transparent 32%),
        linear-gradient(180deg,#fbfbfc 0%,var(--bg) 100%);
      color:var(--ink);
      font-family:"Noto Sans JP","Yu Gothic","Meiryo",system-ui,sans-serif;
      font-weight:800;
    }
    button,select { font:inherit; }
    .page { min-width:1380px; padding:22px 28px 28px; }
    .top-brand {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:14px;
    }
    .brand-title {
      font-size:34px;
      line-height:1;
      font-weight:1000;
      letter-spacing:0;
    }
    .brand-title .red { color:var(--red); }
    .brand-sub {
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
    }
    .app-shell {
      display:grid;
      grid-template-columns:230px minmax(0,1fr);
      gap:0;
      max-width:1760px;
      margin:0 auto;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--panel);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .sidebar {
      position:relative;
      min-height:780px;
      padding:28px 16px;
      background:
        radial-gradient(circle at 20% 8%, rgba(255,255,255,.08), transparent 28%),
        linear-gradient(160deg,#151d1b 0%,#080b0a 64%,#121212 100%);
      color:#fff;
    }
    .side-logo {
      padding:0 8px 22px;
      font-size:25px;
      font-weight:1000;
      letter-spacing:0;
    }
    .side-logo .red { color:var(--red); }
    .nav {
      display:grid;
      gap:9px;
    }
    .nav-btn {
      height:48px;
      border:0;
      border-radius:8px;
      padding:0 14px;
      background:transparent;
      color:#f4f6f8;
      text-align:left;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
      transition:.18s ease;
    }
    .nav-btn:hover { background:rgba(255,255,255,.08); transform:translateX(3px); }
    .nav-btn.active {
      background:linear-gradient(135deg,var(--red) 0%,#b70017 62%,#ef3e4d 100%);
      box-shadow:0 12px 24px rgba(217,0,27,.28);
    }
    .main {
      min-width:0;
      background:linear-gradient(180deg,#fff 0%,#fbfcfd 100%);
    }
    .app-header {
      position:sticky;
      top:0;
      z-index:10;
      display:grid;
      grid-template-columns:minmax(280px,1fr) auto;
      gap:18px;
      align-items:center;
      padding:24px 28px 18px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
    }
    .selected-label {
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }
    .dept-row {
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:4px;
    }
    .dept-name {
      font-size:30px;
      font-weight:1000;
      line-height:1.1;
    }
    .dept-select {
      min-width:220px;
      height:38px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:0 12px;
      background:#fff;
      color:var(--ink);
    }
    .header-actions {
      display:flex;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      gap:10px;
    }
    .pill {
      height:38px;
      display:inline-flex;
      align-items:center;
      border:1px solid var(--line);
      border-radius:8px;
      padding:0 12px;
      background:#fff;
      color:#374151;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .update-btn {
      height:38px;
      border:0;
      border-radius:8px;
      padding:0 18px;
      background:linear-gradient(135deg,var(--red),var(--red-dark));
      color:#fff;
      font-size:13px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(217,0,27,.24);
    }
    .source-line {
      flex-basis:100%;
      text-align:right;
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      overflow-wrap:anywhere;
    }
    .content { padding:22px 28px 28px; }
    .status {
      margin:0 0 14px;
      border:1px solid var(--line);
      border-left:4px solid var(--red);
      border-radius:10px;
      padding:10px 12px;
      background:#fff;
      color:#3b4250;
      font-size:12px;
    }
    .status.error { color:var(--red-dark); background:var(--red-soft); }
    .view { display:none; }
    .view.active { display:block; }
    .section {
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      box-shadow:var(--soft-shadow);
      overflow:hidden;
    }
    .section-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px 10px;
      border-bottom:1px solid var(--line);
    }
    .section-title {
      color:var(--red);
      font-size:15px;
      font-weight:1000;
    }
    .section-more {
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }
    .section-body { padding:14px 16px 16px; }
    .grid { display:grid; gap:14px; }
    .g2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .g3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .g4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .g5 { grid-template-columns:repeat(5,minmax(0,1fr)); }
    .g6 { grid-template-columns:repeat(6,minmax(0,1fr)); }
    .g7 { grid-template-columns:repeat(7,minmax(0,1fr)); }
    .kpi-card,
    .mini-card,
    .panel-card {
      position:relative;
      min-width:0;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      box-shadow:0 8px 20px rgba(17,24,39,.055);
      overflow:hidden;
    }
    .kpi-card {
      min-height:178px;
      padding:18px;
    }
    .kpi-card.wide-spark .spark {
      left:0;
      right:0;
      bottom:0;
      height:70px;
    }
    .kpi-card::after {
      content:"";
      position:absolute;
      right:16px;
      top:16px;
      width:44px;
      height:44px;
      border-radius:50%;
      background:var(--red-soft);
    }
    .kpi-icon {
      position:absolute;
      right:16px;
      top:16px;
      z-index:2;
      width:44px;
      height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      color:var(--red);
      font-size:21px;
      font-weight:1000;
    }
    .kpi-icon svg {
      width:24px;
      height:24px;
      stroke:currentColor;
      fill:none;
      stroke-width:2.4;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .kpi-title,
    .mini-title {
      position:relative;
      z-index:1;
      color:#111827;
      font-size:13px;
      font-weight:1000;
      letter-spacing:0;
    }
    .kpi-value {
      position:relative;
      z-index:1;
      margin-top:22px;
      font-size:22px;
      line-height:1;
      font-weight:1000;
      white-space:nowrap;
    }
    .kpi-sub {
      margin-top:12px;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }
    .up { color:var(--green); }
    .spark {
      position:absolute;
      left:14px;
      right:14px;
      bottom:8px;
      height:44px;
      opacity:.88;
    }
    .spark path[stroke],
    .trend-spark path[stroke] {
      stroke-dasharray:420;
      stroke-dashoffset:420;
      animation:drawLine 1.25s cubic-bezier(.16,1,.3,1) forwards;
    }
    .spark path[fill],
    .trend-spark path[fill] {
      opacity:0;
      animation:fadeArea .9s ease .25s forwards;
    }
    .mini-card {
      min-height:118px;
      padding:16px;
    }
    .mini-value {
      margin-top:18px;
      font-size:23px;
      line-height:1;
      font-weight:1000;
      white-space:nowrap;
    }
    .mini-sub {
      margin-top:12px;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }
    .highlight {
      border-color:#f5a7b1;
      background:linear-gradient(135deg,#fff 0%,#fff8f9 100%);
    }
    .panel-card { padding:14px; }
    .home-purchase-card {
      display:grid;
      gap:12px;
      min-height:760px;
      height:100%;
      grid-template-rows:38px 210px repeat(5,minmax(0,auto));
      align-content:start;
    }
    .home-purchase-card .panel-head {
      height:38px;
      margin:0;
      padding:0;
      border-bottom:0;
      align-items:center;
    }
    .panel-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .panel-title { font-size:15px; font-weight:1000; }
    .panel-link { color:var(--muted); font-size:11px; font-weight:900; }
    .panel-number {
      font-size:24px;
      line-height:1;
      font-weight:1000;
      margin:8px 0 8px;
    }
    .metric-row {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin:0;
      min-height:36px;
    }
    .purchase-main-block {
      position:relative;
      min-height:210px;
      height:210px;
      border:1px solid #f0c4cb;
      border-radius:10px;
      padding:14px 14px 12px;
      background:linear-gradient(135deg,#fff 0%,#fff7f8 100%);
      overflow:hidden;
      display:grid;
      grid-template-rows:20px 40px 1fr;
      align-items:start;
    }
    .purchase-main-block .mini-title {
      margin:0;
      line-height:18px;
    }
    .metric-main {
      font-size:24px;
      line-height:1;
      font-weight:1000;
      white-space:nowrap;
    }
    .trend-chip {
      border-radius:999px;
      padding:5px 9px;
      background:#edfdf6;
      color:var(--green);
      font-size:11px;
      font-weight:1000;
      white-space:nowrap;
    }
    .trend-spark {
      display:block;
      width:100%;
      height:136px;
      margin-top:0;
    }
    .sub-block {
      border-top:1px solid var(--line);
      padding-top:11px;
    }
    .sub-block-title {
      color:var(--red);
      font-size:12px;
      font-weight:1000;
      margin-bottom:8px;
    }
    .compact-pair {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .compact-metric {
      border:1px solid var(--line);
      border-radius:8px;
      padding:9px;
      background:#fbfcfd;
    }
    .compact-label {
      color:var(--muted);
      font-size:10px;
      font-weight:900;
    }
    .compact-value {
      margin-top:5px;
      font-size:18px;
      line-height:1;
      font-weight:1000;
      white-space:nowrap;
    }
    .aa-revenue-block .compact-value {
      font-size:14px;
      letter-spacing:0;
    }
    .donut-layout {
      display:grid;
      grid-template-columns:86px minmax(0,1fr);
      gap:12px;
      align-items:center;
    }
    .donut {
      width:86px;
      height:86px;
      border-radius:50%;
      background:conic-gradient(var(--red) 0deg, var(--red) 120deg, #111 120deg, #111 210deg, #5d7fa8 210deg, #5d7fa8 280deg, #c7ced8 280deg, #c7ced8 360deg);
      position:relative;
      box-shadow:inset 0 0 0 1px var(--line);
      animation:donutIn .85s cubic-bezier(.16,1,.3,1) both;
    }
    .donut::after {
      content:"";
      position:absolute;
      inset:22px;
      border-radius:50%;
      background:#fff;
      box-shadow:0 0 0 1px var(--line);
    }
    .donut-legend {
      display:grid;
      gap:6px;
      font-size:11px;
      font-weight:900;
    }
    .legend-row {
      display:grid;
      grid-template-columns:10px 1fr auto;
      gap:7px;
      align-items:center;
      min-width:0;
    }
    .legend-swatch {
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--red);
    }
    .legend-swatch.black { background:#111; }
    .legend-swatch.blue { background:#5d7fa8; }
    .legend-swatch.gray { background:#c7ced8; }
    .goal-bars {
      height:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      align-items:end;
      padding-top:4px;
    }
    .goal-bar-item {
      min-width:0;
      display:grid;
      grid-template-rows:18px 1fr 16px;
      gap:4px;
      height:100%;
      text-align:center;
    }
    .goal-bar-value {
      color:#111827;
      font-size:11px;
      font-weight:1000;
      white-space:nowrap;
    }
    .goal-bar-track {
      align-self:end;
      height:100%;
      min-height:70px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      border-radius:8px;
      background:#f2f4f7;
      overflow:hidden;
    }
    .goal-bar-fill {
      width:100%;
      min-height:5%;
      border-radius:8px 8px 0 0;
      background:linear-gradient(180deg,#ef4050 0%,#d9001b 100%);
      transform-origin:bottom;
      animation:barGrow .85s cubic-bezier(.16,1,.3,1) both;
    }
    .goal-bar-label {
      color:var(--muted);
      font-size:10px;
      font-weight:1000;
      white-space:nowrap;
    }
    .goal-progress-list {
      display:grid;
      gap:9px;
    }
    .goal-progress-item {
      display:grid;
      gap:5px;
    }
    .goal-progress-head {
      display:flex;
      justify-content:space-between;
      gap:8px;
      font-size:11px;
      font-weight:1000;
    }
    .goal-progress-bar {
      position:relative;
      height:25px;
      border-radius:999px;
      background:#eef1f5;
      overflow:hidden;
    }
    .goal-progress-fill {
      position:absolute;
      inset:0 auto 0 0;
      width:0;
      border-radius:inherit;
      background:linear-gradient(90deg,#d9001b,#f35a67);
      transition:width .9s cubic-bezier(.16,1,.3,1);
    }
    .goal-progress-text {
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 8px;
      color:#111827;
      font-size:10px;
      font-weight:1000;
      white-space:nowrap;
    }
    @keyframes barGrow {
      from { transform:scaleY(0); }
      to { transform:scaleY(1); }
    }
    @keyframes drawLine {
      to { stroke-dashoffset:0; }
    }
    @keyframes fadeArea {
      to { opacity:1; }
    }
    @keyframes donutIn {
      from { transform:rotate(-50deg) scale(.82); opacity:.15; }
      to { transform:rotate(0deg) scale(1); opacity:1; }
    }
    .bar {
      height:13px;
      border-radius:999px;
      background:#f0f2f5;
      overflow:hidden;
    }
    .fill {
      height:100%;
      width:0;
      border-radius:inherit;
      background:linear-gradient(90deg,var(--red),#f35a67);
      transition:width .9s cubic-bezier(.16,1,.3,1);
    }
    .purchase-detail-page {
      display:grid;
      gap:16px;
    }
    .purchase-detail-hero {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .purchase-detail-layout {
      display:grid;
      grid-template-columns:1.15fr .95fr;
      gap:16px;
      align-items:start;
    }
    .purchase-detail-stack {
      display:grid;
      gap:16px;
    }
    .detail-block {
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      box-shadow:var(--soft-shadow);
      overflow:hidden;
    }
    .detail-block-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px 9px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(135deg,#fff 0%,#fff3f5 100%);
    }
    .detail-block-title {
      color:var(--red);
      font-size:14px;
      font-weight:1000;
    }
    .detail-block-sub {
      color:var(--muted);
      font-size:10px;
      font-weight:1000;
    }
    .detail-block-body {
      padding:14px;
    }
    .detail-metric-grid {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .detail-metric-grid.g4 {
      grid-template-columns:repeat(4,minmax(0,1fr));
    }
    .detail-metric {
      min-height:92px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:12px;
      background:linear-gradient(135deg,#fff 0%,#fbfcfd 100%);
    }
    .detail-metric.hot {
      border-color:#f3a7b1;
      background:linear-gradient(135deg,#fff 0%,#fff2f4 100%);
    }
    .detail-label {
      color:var(--muted);
      font-size:11px;
      font-weight:1000;
    }
    .detail-value {
      margin-top:8px;
      font-size:25px;
      line-height:1;
      font-weight:1000;
      white-space:nowrap;
    }
    .detail-value.small {
      font-size:19px;
    }
    .detail-chart-row {
      display:grid;
      grid-template-columns:120px minmax(0,1fr) 96px;
      gap:10px;
      align-items:center;
      margin-top:10px;
      font-size:11px;
      font-weight:1000;
    }
    .detail-line-card {
      min-height:190px;
      border:1px solid #f0c4cb;
      border-radius:12px;
      padding:14px;
      background:linear-gradient(135deg,#fff 0%,#fff7f8 100%);
      overflow:hidden;
    }
    .detail-line-card .trend-spark {
      height:118px;
      margin-top:4px;
    }
    .dual-chart-card {
      border:1px solid #f0c4cb;
      border-radius:12px;
      padding:12px 14px 10px;
      background:linear-gradient(135deg,#fff 0%,#fff7f8 100%);
      overflow:hidden;
    }
    .dual-chart-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }
    .dual-chart-title {
      font-size:12px;
      font-weight:1000;
      color:var(--red);
    }
    .dual-chart-legend {
      display:flex;
      align-items:center;
      gap:12px;
      color:#111827;
      font-size:11px;
      font-weight:1000;
      white-space:nowrap;
    }
    .dual-chart-legend i {
      display:inline-block;
      width:18px;
      height:4px;
      border-radius:999px;
      margin-right:5px;
      vertical-align:middle;
    }
    .dual-chart-legend .red-line { background:var(--red); }
    .dual-chart-legend .blue-line { background:var(--blue); }
    .dual-line-chart {
      display:block;
      width:100%;
      height:208px;
    }
    .dual-line-chart .grid-lines line {
      stroke:#e7ebf0;
      stroke-width:1;
    }
    .dual-area {
      opacity:.9;
    }
    .dual-area.purchase { fill:url(#dualPurchaseFill); }
    .dual-area.assessment { fill:url(#dualAssessmentFill); }
    .dual-area.sales { fill:url(#dualSalesFill); }
    .dual-area.dispatch { fill:url(#dualDispatchFill); }
    .dual-area.marketing { fill:url(#marketingInfoFill); }
    .dual-line {
      fill:none;
      stroke-width:4;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:900;
      stroke-dashoffset:900;
      animation:drawLine 1.1s cubic-bezier(.16,1,.3,1) forwards;
    }
    .dual-line.purchase { stroke:var(--red); }
    .dual-line.assessment {
      stroke:var(--blue);
      animation-delay:.12s;
    }
    .dual-line.sales { stroke:var(--red); }
    .dual-line.dispatch {
      stroke:var(--blue);
      animation-delay:.12s;
    }
    .dual-dots.purchase circle { fill:var(--red); }
    .dual-dots.assessment circle { fill:var(--blue); }
    .dual-dots.sales circle { fill:var(--red); }
    .dual-dots.dispatch circle { fill:var(--blue); }
    .chart-point {
      cursor:pointer;
      pointer-events:all;
      stroke:#fff;
      stroke-width:2;
    }
    .chart-tooltip {
      position:fixed;
      z-index:9999;
      display:none;
      min-width:120px;
      max-width:220px;
      padding:8px 10px;
      border-radius:8px;
      background:#111318;
      color:#fff;
      font-size:12px;
      font-weight:1000;
      line-height:1.35;
      box-shadow:0 12px 28px rgba(17,24,39,.22);
      pointer-events:none;

      if (type === 'percent') return `${(Math.abs(n) <= 1 ? n * 100 : n).toFixed(1)}%`;
      if (type === 'days') return `${n.toLocaleString(undefined,{maximumFractionDigits:1})}日`;

    function kpiIcon(label) {

      if (text === 'F') return '▣';
      if (text.includes('買取')) return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 15h16l-1.6-5.1A3 3 0 0 0 15.5 8h-7A3 3 0 0 0 5.6 9.9L4 15Z"/><path d="M6 15v2.2"/><path d="M18 15v2.2"/><circle cx="7.5" cy="17.5" r="1.7"/><circle cx="16.5" cy="17.5" r="1.7"/><path d="M8 8l1.2-2h5.6L16 8"/></svg>';

    function stack(title, items) {
      const total = items.reduce((sum,it)=>sum + num(it.value),0) || 1;
      const colors = ['red','black','blue','gray'];
      return `<article class="panel-card">
        <div class="panel-head"><div class="panel-title">${esc(title)}</div></div>
        <div class="stack">${items.map((it,i)=>`<div class="seg ${colors[i%colors.length]}" data-width="${rate(it.value,total)*100}"></div>`).join('')}</div>
        ${items.map((it,i)=>`<div class="ratio-row"><span>${esc(it.label)} ${fmt(it.value,'number','台')}</span><span>${(rate(it.value,total)*100).toFixed(1)}%</span></div>`).join('')}
      </article>`;

    function donutMarkup(items,mother,unit='台') {
      const total = Math.max(1,num(mother));
      const rawParts = items.map(item => ({...item, ratio:rate(item.value,total)}));
      const rawTotal = rawParts.reduce((sum,item) => sum + item.ratio,0);
      const visualParts = rawParts.map(item => ({...item, visualRatio: rawTotal > 1 ? item.ratio / rawTotal : item.ratio}));
      if (rawTotal < 1) visualParts.push({label:'その他', value:total * (1 - rawTotal), color:'#eef1f5', cls:'gray', ratio:1 - rawTotal, visualRatio:1 - rawTotal});
      let start = 0;
      const gradient = visualParts.map(item => {
        const deg = item.visualRatio * 360;
        const part = `${item.color} ${start}deg ${start + deg}deg`;
        start += deg;
        return part;
      }).join(', ');
      return `<div class="donut-layout">
        <div class="donut" style="background:conic-gradient(${gradient});"></div>
        <div class="donut-legend">
          ${rawParts.map(item => `<div class="legend-row"><span class="legend-swatch ${item.cls}"></span><span>${esc(item.label)} ${fmt(item.value,'number',unit)}</span><strong>${(item.ratio*100).toFixed(1)}%</strong></div>`).join('')}
        </div>
      </div>`;
    }

      const turnoverGoal = pick(s,['回転率目標','回転数目標'],0);
      const turnoverMax = Math.max(1,num(turnoverForecast),num(turnoverGoal));
      const total = Math.max(1,num(dispatchStockQ));
      const slices = [
        {label:'在庫Q', value:stockQ, color:'var(--red)', cls:''},
        {label:'未掲載Q', value:unlistedQ, color:'#111', cls:'black'},
        {label:'未受入Q', value:unacceptedQ, color:'#5d7fa8', cls:'blue'},
        {label:'未入庫Q', value:notArrivedQ, color:'#c7ced8', cls:'gray'}
      ];
      const rawParts = slices.map(item => ({...item, ratio:rate(item.value,total)}));
      const rawTotal = rawParts.reduce((sum,item) => sum + item.ratio,0);
      const visualParts = rawParts.map(item => ({...item, visualRatio: rawTotal > 1 ? item.ratio / rawTotal : item.ratio}));
      if (rawTotal < 1) visualParts.push({label:'その他', value:total * (1 - rawTotal), color:'#eef1f5', cls:'gray', ratio:1 - rawTotal, visualRatio:1 - rawTotal});
      let start = 0;
      const gradient = visualParts.map(item => {
        const deg = item.visualRatio * 360;
        const part = `${item.color} ${start}deg ${start + deg}deg`;
        start += deg;
        return part;
      }).join(', ');
      const dayDiff = pick(s,['販売Q前日差','販売前日差'],Math.max(1,Math.round(num(salesQ) * .05)));
      return `<article class="panel-card home-purchase-card">

    function getAreaVal(row, keys) {

    function marketingTrendChart(calendarRows, totalInfo) {
      const rows = (calendarRows || []).filter(row => row && Object.keys(row).length);
      const points = rows.map((row, i) => {
        const dateLabel = getRowValue(row,['日付','日','譌･莉・']) || `${i + 1}`;
        const info = getRowValue(row,['情報数','情報','MOTA情報数','総情報数']) || 0;
        return { dateLabel, info:num(info) };
      });
      const source = points.some(p => p.info) ? points : [
        {dateLabel:'1', info:Math.round(num(totalInfo)*.12)},
        {dateLabel:'2', info:Math.round(num(totalInfo)*.28)},
        {dateLabel:'3', info:Math.round(num(totalInfo)*.46)},
        {dateLabel:'4', info:Math.round(num(totalInfo)*.60)},
        {dateLabel:'5', info:Math.round(num(totalInfo)*.78)},
        {dateLabel:'6', info:num(totalInfo)}
      ];
      const w = 560, h = 190, padX = 30, top = 18, bottom = 34;
      const chartH = h - top - bottom;
      const maxInfo = Math.max(1,...source.map(p => p.info));
      const xAt = i => source.length <= 1 ? padX : padX + (i * (w - padX * 2) / (source.length - 1));
      const yAt = value => top + chartH - (num(value) / maxInfo) * chartH;
      const path = source.map((p,i) => `${i ? 'L' : 'M'}${xAt(i).toFixed(1)} ${yAt(p.info).toFixed(1)}`).join(' ');
      const dots = source.map((p,i) => `<circle class="chart-point" data-tooltip="${esc(`${p.dateLabel}\n情報数 ${fmt(p.info,'number','件')}`)}" cx="${xAt(i).toFixed(1)}" cy="${yAt(p.info).toFixed(1)}" r="4.2"></circle>`).join('');
      const xLabels = source
        .filter((_,i) => i === 0 || i === source.length - 1 || i % Math.ceil(source.length / 6) === 0)
        .map((p,i,arr) => {
          const originalIndex = source.indexOf(p);
          return `<text x="${xAt(originalIndex).toFixed(1)}" y="${h - 8}" text-anchor="${i === 0 ? 'start' : i === arr.length - 1 ? 'end' : 'middle'}">${esc(String(p.dateLabel).replace(/^0/,''))}</text>`;
        }).join('');
      return `<div class="dual-chart-card">
        <div class="dual-chart-head">
          <div class="dual-chart-title">日別情報数推移</div>
          <div class="dual-chart-legend"><span><i class="red-line"></i>情報数 ${fmt(source[source.length - 1]?.info || 0,'number','件')}</span></div>
        </div>
        <svg class="dual-line-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="marketingInfoFill" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="#ef4050" stop-opacity=".22"/>
              <stop offset="100%" stop-color="#ef4050" stop-opacity=".02"/>
            </linearGradient>
          </defs>
          <g class="grid-lines">
            <line x1="${padX}" y1="${top}" x2="${w-padX}" y2="${top}"/>
            <line x1="${padX}" y1="${top + chartH/2}" x2="${w-padX}" y2="${top + chartH/2}"/>
            <line x1="${padX}" y1="${top + chartH}" x2="${w-padX}" y2="${top + chartH}"/>
          </g>
          <path class="dual-area marketing" d="${path} L${xAt(source.length-1).toFixed(1)} ${top+chartH} L${padX} ${top+chartH} Z"/>
          <path class="dual-line purchase" d="${path}"/>
          <g class="dual-dots purchase">${dots}</g>
          <g class="dual-xlabels">${xLabels}</g>
        </svg>
      </div>`;
    }

      return `<div class="triple-compare-item">
        <div class="triple-head"><span>${esc(label)}</span><span>実績 ${actualRate.toFixed(1)}% / 予想 ${forecastRate.toFixed(1)}%</span></div>

        <div class="triple-row"><span>予想</span><div class="bar"><div class="fill blue" data-width="${rate(forecast,max)*100}"></div></div><span>${fmt(forecast,type,suffix)}</span></div>

        {label:'販売Q', actual:pick(s,KEY.salesQ,0), goal:pick(s,KEY.salesGoal,0), forecast:pick(s,['販売Q予想','販売Q予想実績'],0), type:'number', suffix:'台'},
        {label:'査定Q', actual:pick(s,KEY.assessmentQ,0), goal:pick(s,KEY.assessmentGoal,0), forecast:pick(s,['査定Q予想','査定Q予想実績'],0), type:'number', suffix:'台'},
        {label:'情報数', actual:pick(s,KEY.infoQ,0), goal:pick(s,KEY.infoGoal,0), forecast:pick(s,['情報数予想','情報数予想数'],0), type:'number', suffix:'件'},
        {label:'開示数', actual:pick(s,KEY.disclosureQ,0), goal:pick(s,KEY.disclosureGoal,0), forecast:pick(s,['開示数予想','開示予想数'],0), type:'number', suffix:'件'},
        {label:'契約数', actual:pick(s,KEY.contractQ,0), goal:pick(s,KEY.contractGoal,0), forecast:pick(s,['契約数予想','成約数予想','成約予想数'],0), type:'number', suffix:'件'},
        {label:'落札MQ', actual:pick(s,KEY.aaMq,0), goal:pick(s,['落札MQ目標','AAMQ目標'],0), forecast:pick(s,['落札MQ予想'],0), type:'money'},
        {label:'販売総MQ', actual:pick(s,KEY.salesMq,0), goal:pick(s,['販売総MQ目標'],0), forecast:pick(s,['販売総MQ予想'],0), type:'money'},
        {label:'AA@', actual:pick(s,KEY.aaAvg,0), goal:pick(s,['AA@目標','AA＠目標'],0), forecast:0, type:'money'},
        {label:'納車@', actual:pick(s,['納車@','納車＠'],0), goal:pick(s,['納車@目標','納車＠目標'],0), forecast:0, type:'money'}
      ];
    }
    function targetManagePage(s) {
      const rows = targetKpiRows(s);
      const riskRows = rows.map(row => {
        const basis = num(row.forecast) || num(row.actual);
        const percent = rate(basis,row.goal) * 100;
        return {...row, percent, state:targetState(percent)};
      }).sort((a,b) => a.percent - b.percent);
      const alertItems = riskRows.slice(0,4);
      return `<div class="purchase-detail-page">
        ${section('目標管理',`
          <div class="alert-grid">
            ${alertItems.map(row => `<div class="alert-card ${row.state.cls}">
              <div class="alert-label">${esc(row.state.label)} / ${esc(row.label)}</div>
              <div class="alert-value">${row.percent.toFixed(1)}%</div>
              <div class="mini-sub">予想または実績 ${fmt(num(row.forecast)||num(row.actual),row.type,row.suffix||'')} / 目標 ${fmt(row.goal,row.type,row.suffix||'')}</div>
            </div>`).join('')}
          </div>
        `,'危険KPIアラート')}
        ${detailBlock('目標・予想・実績',`
          <div class="target-detail-grid">
            ${rows.map(row => tripleCompareItem(row.label,row.actual,row.forecast,row.goal,row.type,row.suffix||'')).join('')}
          </div>
        `,'黒：目標 / 紺：予想 / 赤：実績')}
        ${detailBlock('差分管理',`
          <div class="table-wrap"><table><thead><tr><th>KPI</th><th>目標差分</th><th>予想差分</th><th>必要残</th><th>現在進捗</th></tr></thead>
          <tbody>${rows.map(row => {
            const actual = num(row.actual);
            const goal = num(row.goal);
            const forecast = num(row.forecast);
            return `<tr><td>${esc(row.label)}</td><td>${fmt(actual-goal,row.type,row.suffix||'')}</td><td>${fmt((forecast||actual)-goal,row.type,row.suffix||'')}</td><td>${fmt(Math.max(0,goal-actual),row.type,row.suffix||'')}</td><td>${(rate(actual,goal)*100).toFixed(1)}%</td></tr>`;
          }).join('')}</tbody></table></div>
        `,'目標との差分・残必要数')}
      </div>`;
    }
    function personalValue(row, keys) {
      return getRowValue(row,keys);
    }
    function roleBadgeClass(role) {
      const text = String(role || '');
      if (!text) return '';
      if (text.includes('責任者')) return 'manager';
      if (text.includes('買取')) return 'purchase';
      if (text.includes('販売')) return 'sales';
      return '';
    }
    function personalProfileCell(row) {
      const name = personalValue(row,['氏名','名前','スタッフ名']) || '-';
      const base = personalValue(row,['拠点','所属拠点','店舗']) || '-';
      const rank = personalValue(row,['ランク']) || '-';
      const role = personalValue(row,['役職','職位','肩書']) || '';
      const badge = role ? `<span class="role-badge ${roleBadgeClass(role)}">${esc(role)}</span>` : '';
      return `<div class="personal-name">${esc(name)}<div class="personal-meta"><span class="personal-meta-text">${esc(base)} / ${esc(rank)}</span>${badge}</div></div>`;
    }
    function personalManagePage(rows=[]) {
      const people = rows || [];
      return `<div class="purchase-detail-page">
        ${section('個人実績',`
          <div class="personal-card-grid">
            ${ranking('MQランキング',people,['MQ'],'money')}
            ${ranking('買取Qランキング',people,['買取Q','雋ｷ蜿鵬'],'number','台')}
            ${ranking('販売Qランキング',people,['販売Q','雋ｩ螢ｲQ'],'number','台')}
          </div>
        `,'ランキング上位')}
        ${detailBlock('個人別KPI比較',`
          <div class="personal-kpi-list">
            ${people.map((row,i) => `<div class="personal-kpi-row">
              <span class="rank-badge ${i===0?'top':i===1?'second':i===2?'third':''}">${i+1}</span>
              ${personalProfileCell(row)}
              <div>MQ<br>${fmt(personalValue(row,['MQ']),'money')}</div>
              <div>査定Q<br>${fmt(personalValue(row,['査定Q','査定数']),'number','台')}</div>
              <div>買取Q<br>${fmt(personalValue(row,['買取Q','雋ｷ蜿鵬']),'number','台')}</div>
              <div>販売Q<br>${fmt(personalValue(row,['販売Q','雋ｩ螢ｲQ']),'number','台')}</div>
              <div>予約数<br>${fmt(personalValue(row,['予約数']),'number','件')}</div>
              <div>成約CVR<br>${fmt(personalValue(row,['成約CVR','成約率']),'percent')}</div>
            </div>`).join('') || '<div class="status">個人実績データがありません。</div>'}
          </div>
        `,'ランキングだけでなく育成視点で比較')}
        ${detailBlock('育成・偏り確認',`
          <div class="detail-metric-grid g4">
            ${detailMetric('高成約率人数',people.filter(r => pct(personalValue(r,['成約CVR','成約率'])) >= 45).length,'number','名')}
            ${detailMetric('買取Q上位人数',people.filter(r => num(personalValue(r,['買取Q','雋ｷ蜿鵬'])) >= 10).length,'number','名')}
            ${detailMetric('販売Q上位人数',people.filter(r => num(personalValue(r,['販売Q','雋ｩ螢ｲQ'])) >= 3).length,'number','名')}
            ${detailMetric('確認対象人数',people.filter(r => pct(personalValue(r,['成約CVR','成約率'])) < 30).length,'number','名')}
          </div>
        `,'強み・育成候補を抽出')}
      </div>`;
    }
    function calendarMetric(row, keys) {
      return getRowValue(row,keys) || 0;
    }
    function calendarManagePage(calendarRows=[], s={}) {
      const rows = calendarRows || [];
      const now = new Date();
      const totalDays = rows.length || new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      const elapsed = Math.min(totalDays, now.getDate());
      const remain = Math.max(0,totalDays-elapsed);
      const purchaseTotal = rows.reduce((sum,r)=>sum+num(calendarMetric(r,['買取Q','買取','契約'])),0) || num(pick(s,KEY.purchaseQ,0));
      const salesTotal = rows.reduce((sum,r)=>sum+num(calendarMetric(r,['販売Q','販売','受注'])),0) || num(pick(s,KEY.salesQ,0));
      const infoTotal = rows.reduce((sum,r)=>sum+num(calendarMetric(r,['情報数','情報'])),0) || num(pick(s,KEY.infoQ,0));
      const todayRow = rows.find(r => String(calendarMetric(r,['日付','日'])).includes(`/${now.getDate()}`)) || rows[elapsed-1] || {};
      const timeline = rows.map((row,i) => {
        const date = String(calendarMetric(row,['日付','日']) || `${now.getMonth()+1}/${i+1}`);
        const weekday = calendarMetric(row,['曜日']) || ['日','月','火','水','木','金','土'][new Date(now.getFullYear(), now.getMonth(), i+1).getDay()];
        const cls = weekday === '土' ? ' sat' : weekday === '日' ? ' sun' : '';
        const todayCls = i + 1 === now.getDate() ? ' today' : '';
        return `<div class="calendar-timeline-row${cls}${todayCls}">
          <div>${esc(date)}</div><div>${esc(weekday)}</div>
          <div>買取 ${fmt(calendarMetric(row,['買取Q','買取','契約']),'number','台')}</div>
          <div>査定 ${fmt(calendarMetric(row,['査定Q','査定','査定数']),'number','台')}</div>
          <div>販売 ${fmt(calendarMetric(row,['販売Q','販売','受注']),'number','台')}</div>
          <div>情報 ${fmt(calendarMetric(row,['情報数','情報']),'number','件')}</div>
          <div>成約 ${fmt(calendarMetric(row,['成約CVR','成約率']),'percent')}</div>
        </div>`;
      }).join('');
      return `<div class="purchase-detail-page">
        ${section('カレンダー',`
          <div class="calendar-summary-grid">
            ${detailMetric('経過日数',elapsed,'number','日')}
            ${detailMetric('残日数',remain,'number','日')}
            ${detailMetric('営業日数',totalDays,'number','日')}
            ${detailMetric('今日の買取Q',calendarMetric(todayRow,['買取Q','買取','契約']),'number','台')}
            ${detailMetric('今月買取Q',purchaseTotal,'number','台')}
            ${detailMetric('着地予測',elapsed ? Math.round(purchaseTotal / elapsed * totalDays) : 0,'number','台')}
          </div>
        `,'月間状況')}
        ${detailBlock('日別タイムライン',`
          <div class="calendar-timeline">${timeline || '<div class="status">日別データがありません。</div>'}</div>
        `,'土曜は水色 / 日曜祝日はピンク / 当日は赤枠')}
        ${detailBlock('日別グラフ',`
          <div class="calendar-mini-grid">
            ${dailyDualLineChart(rows)}
            ${salesDailyDualLineChart(rows)}
            ${marketingTrendChart(rows,infoTotal)}
            ${detailBlock('月間累計',`
              ${detailProgressRow('買取Q',purchaseTotal,pick(s,KEY.purchaseGoal,0),'台')}
              ${detailProgressRow('販売Q',salesTotal,pick(s,KEY.salesGoal,0),'台','blue')}
              ${detailProgressRow('情報数',infoTotal,pick(s,KEY.infoGoal,0),'件','black')}
            `,'目標比較')}
          </div>
        `,'日ごとの波を確認')}
      </div>`;
    }
    function rawDataTable(s,fieldMeta) {
      const rows = Object.entries(s).map(([k,v],i) => {
        const meta = fieldMeta[k] || {};
        return `<tr><td>${i+1}</td><td>${esc(k)}</td><td>${esc(meta.trigger || '-')}</td><td>${esc(meta.page || '-')}</td><td>${esc(v === '' ? 0 : v)}</td></tr>`;
      }).join('');
      return `<div class="table-wrap"><table><thead><tr><th>No</th><th>取得キー</th><th>取得トリガー</th><th>表示ページ</th><th>値</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    function switchView(view) {
      ['home','basic','purchase','sales','marketing','target','personal','calendar','settings'].forEach(name => {
        document.getElementById(`view-${name}`)?.classList.toggle('active', name === view);
        document.getElementById(`menu-${name}`)?.classList.toggle('active', name === view);
      });
      runBars();
    }
    function runBars() {
      requestAnimationFrame(() => {
        document.querySelectorAll('.fill,.seg,.goal-progress-fill').forEach(el => {
          const w = Number(el.dataset.width || 0);
          el.style.width = '0%';
          requestAnimationFrame(() => {
            el.style.width = `${Math.max(0,Math.min(100,w))}%`;
          });
        });
        document.querySelectorAll('.donut').forEach(el => {
          el.style.animation = 'none';
          void el.offsetWidth;
          el.style.animation = '';
        });
        document.querySelectorAll('.spark path[stroke],.trend-spark path[stroke]').forEach(el => {
          el.style.animation = 'none';
          void el.getBoundingClientRect();
          el.style.animation = '';
        });
        document.querySelectorAll('.spark path[fill],.trend-spark path[fill]').forEach(el => {
          el.style.animation = 'none';
          void el.getBoundingClientRect();
          el.style.animation = '';
        });
      });
      animateNumbers();
      initChartTooltips();
    }
    function initChartTooltips() {
      if (window.__tjChartTooltipReady) return;
      window.__tjChartTooltipReady = true;
      const tooltip = document.createElement('div');
      tooltip.className = 'chart-tooltip';
      document.body.appendChild(tooltip);
      document.addEventListener('pointermove', event => {
        const point = event.target.closest ? event.target.closest('.chart-point') : null;
        if (!point) {
          tooltip.style.display = 'none';
          return;
        }
        tooltip.textContent = point.dataset.tooltip || '';
        tooltip.style.left = `${event.clientX}px`;
        tooltip.style.top = `${event.clientY}px`;
        tooltip.style.display = 'block';
      });
      document.addEventListener('pointerleave', () => {
        tooltip.style.display = 'none';
      });
    }
    function animateNumbers() {
      const nodes = document.querySelectorAll('.view.active .count-up');
      nodes.forEach(el => {
        const raw = el.dataset.value || 0;
        const type = el.dataset.type || 'number';
        const suffix = el.dataset.suffix || '';
        const target = num(raw);
        const start = performance.now();
        const duration = 820;
        function tick(now) {
          const p = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          const current = target * eased;
          el.textContent = fmt(type === 'percent' ? current : current, type, suffix);
          if (p < 1) requestAnimationFrame(tick);
          else el.textContent = fmt(raw, type, suffix);
        }
        requestAnimationFrame(tick);
      });
    }
    async function init() {
      try {
        const options = await runGas('getSalesOsDeptOptions');
        const select = document.getElementById('deptSelect');
        select.innerHTML = (options || []).map(name => `<option>${esc(name)}</option>`).join('');
        if (!options || !options.length) {
          setStatus('参照設定に有効な営業部がありません。', true);
          return;
        }
        select.value = options.includes('千葉営業部') ? '千葉営業部' : options[0];
        await loadDashboard();
      } catch (error) {
        setStatus(error.message || String(error), true);
      }
    }
    async function loadDashboard() {
      try {
        const dept = document.getElementById('deptSelect').value;
        setStatus(`${dept} のリンクOSを読み込んでいます...`);
        const data = await runGas('getSalesOsDashboardByDept', [dept]);
        renderDashboard(data);
        setStatus(`${dept} を表示しています。`);
      } catch (error) {
        setStatus(error.message || String(error), true);
      }
    }
    init();
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TJ-SalesOS 参照テスト</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f3f3f4;
      color: #080808;
      font-family: Arial, "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 800;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      background: #050505;
      color: #fff;
      border-bottom: 5px solid #d7001d;
    }
    h1 { margin: 0; font-size: 26px; }
    .sub { margin-top: 4px; color: #cfd3da; font-size: 12px; }
    .controls { display: flex; gap: 10px; align-items: center; }
    select, button {
      height: 40px;
      border: 2px solid #fff;
      border-radius: 7px;
      font-weight: 1000;
      font-size: 14px;
    }
    select { min-width: 240px; padding: 0 10px; }
    button {
      padding: 0 14px;
      color: #fff;
      background: linear-gradient(180deg, #e10020, #980013);
      cursor: pointer;
    }
    main { padding: 20px; }
    .panel {
      margin-bottom: 16px;
      border: 3px solid #0b0b0c;
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      box-shadow: 0 6px 0 rgba(0,0,0,.08);
    }
    .panel-title {
      margin: 0 0 12px;
      padding-bottom: 9px;
      border-bottom: 3px solid #0b0b0c;
      color: #d7001d;
      font-size: 17px;
      font-weight: 1000;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .meta-card {
      border: 2px solid #0b0b0c;
      border-radius: 7px;
      padding: 10px;
      background: linear-gradient(135deg, #fff, #fff5f6);
    }
    .label { color: #4c515b; font-size: 12px; margin-bottom: 6px; }
    .value {
      font-size: 16px;
      font-weight: 1000;
      overflow-wrap: anywhere;
    }
    .status {
      margin: 0 0 12px;
      border: 2px solid #0b0b0c;
      border-left: 8px solid #d7001d;
      border-radius: 7px;
      padding: 10px 12px;
      background: #fff;
      font-size: 13px;
    }
    .status.error {
      border-left-color: #d7001d;
      background: #fff0f2;
      color: #990013;
    }
    .table-wrap {
      max-height: 68vh;
      overflow: auto;
      border: 2px solid #0b0b0c;
      border-radius: 7px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid #d8dbe0;
      border-right: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #0b0b0c;
      color: #fff;
    }
    tr:nth-child(even) td { background: #fafafa; }
    .empty { color: #9aa0aa; }
    .copy-area {
      width: 100%;
      min-height: 160px;
      border: 2px solid #0b0b0c;
      border-radius: 7px;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
    }
    @media (max-width: 900px) {
      header, .meta-grid { grid-template-columns: 1fr; }
      .controls { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>TJ-SalesOS 参照テスト</h1>
      <div class="sub">参照設定 → 営業部別リンクOS → 1行JSON確認</div>
    </div>
    <div class="controls">
      <select id="deptSelect"></select>
      <button type="button" onclick="loadSelectedDept()">参照確認</button>
      <button type="button" onclick="buildReferenceSheet()">参照設定作成</button>
    </div>
  </header>

  <main>
    <p id="status" class="status">営業部を選択して参照確認してください。</p>

    <section class="panel">
      <h2 class="panel-title">参照先情報</h2>
      <div id="meta" class="meta-grid"></div>
    </section>

    <section class="panel">
      <h2 class="panel-title">取得データ 全ヘッダー・値</h2>
      <div id="table" class="table-wrap"></div>
    </section>

    <section class="panel">
      <h2 class="panel-title">JSONコピー用</h2>
      <textarea id="jsonBox" class="copy-area" readonly></textarea>
    </section>
  </main>

  <script>
    function runGas(name, args = []) {
      return new Promise((resolve, reject) => {
        if (!window.google || !google.script || !google.script.run) {
          reject(new Error('GAS環境ではありません。本番GASに配置して確認してください。'));
          return;
        }
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name].apply(google.script.run, args);
      });
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = `status${isError ? ' error' : ''}`;
    }

    async function init() {
      try {
        setStatus('営業部一覧を取得しています...');
        const options = await runGas('getSalesOsDeptOptions');
        const select = document.getElementById('deptSelect');
        select.innerHTML = (options || []).map(name => `<option>${esc(name)}</option>`).join('');
        if (!options || !options.length) {
          setStatus('有効な営業部がありません。参照設定シートを確認してください。', true);
          return;
        }
        setStatus('営業部を選択して参照確認してください。');
      } catch (error) {
        setStatus(error.message || String(error), true);
      }
    }

    async function buildReferenceSheet() {
      try {
        setStatus('参照設定シートを作成しています...');
        const result = await runGas('buildSalesOsReferenceSheet');
        setStatus(`参照設定シートを作成しました: ${result.sheetName}`);
        await init();
      } catch (error) {
        setStatus(error.message || String(error), true);
      }
    }

    async function loadSelectedDept() {
      const dept = document.getElementById('deptSelect').value;
      if (!dept) {
        setStatus('営業部が選択されていません。', true);
        return;
      }
      try {
        setStatus(`${dept} の参照先を読み込んでいます...`);
        const data = await runGas('getSalesOsDashboardByDept', [dept]);
        renderResult(data);
        setStatus(`${dept} の参照確認が完了しました。`);
      } catch (error) {
        setStatus(error.message || String(error), true);
      }
    }

    function renderResult(data) {
      const meta = [
        ['営業部', data.selectedDept],
        ['対象月', data.targetMonth],
        ['参照スプレッドシート名', data.sourceSpreadsheetName],
        ['参照スプレッドシートID', data.sourceSpreadsheetId],
        ['参照シート名', data.sourceSheetName],
        ['取得行', data.rowNumber],
        ['ヘッダー数', data.headerCount],
        ['更新日時', data.updatedAt || '-']
      ];
      document.getElementById('meta').innerHTML = meta.map(([label, value]) => `
        <div class="meta-card">
          <div class="label">${esc(label)}</div>
          <div class="value">${esc(value || '-')}</div>
        </div>
      `).join('');

      const entries = Object.entries(data.summary || {});
      document.getElementById('table').innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:70px;">No</th>
              <th style="width:260px;">ヘッダー名</th>
              <th>値</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(([key, value], index) => `
              <tr>
                <td>${index + 1}</td>
                <td>${esc(key)}</td>
                <td class="${value === '' ? 'empty' : ''}">${esc(value === '' ? '-' : value)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      document.getElementById('jsonBox').value = JSON.stringify(data, null, 2);
    }

    init();
  </script>
</body>
</html>
